services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rex
      POSTGRES_PASSWORD: rex
      POSTGRES_DB: researcher_explorer
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rex -d researcher_explorer"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://rex:rex@db:5432/researcher_explorer
      OPENALEX_MAILTO: ${OPENALEX_MAILTO:-anonymous@example.com}
      UM_INSTITUTION_ID: ${UM_INSTITUTION_ID:-I368840534}
      HTTP_CONCURRENCY: ${HTTP_CONCURRENCY:-8}
      MAX_COLLABORATORS_PER_AUTHOR: ${MAX_COLLABORATORS_PER_AUTHOR:-40}
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  pgdata:
